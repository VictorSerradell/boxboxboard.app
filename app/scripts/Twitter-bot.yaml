name: BoxBoxBoard Twitter Bot

on:
  schedule:
    # Every Tuesday at 14:00 UTC (week change day)
    - cron: '0 14 * * 2'
    # Every Friday at 16:00 UTC (weekend racing recap)
    - cron: '0 16 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install twitter-api-v2 node-fetch

      - name: Run bot
        env:
          TWITTER_API_KEY:            ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:         ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:       ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          BBB_API_URL:                https://www.boxboxboard.app
        run: node scripts/twitter-bot.js